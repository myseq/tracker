name: Update CISA KEV List
on:
  workflow_dispatch: # Allows manual trigger
  schedule:
    - cron: '43 21 * * *' # Runs daily 

jobs:
  checking-cisa-kev:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetching CISA KEV
        run: |
          # Fetch the official JSON feed
          curl -s https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json > kev.json
          
      - name: Parsing JSON
        run: |
          echo -e "# Myseq Tracker\n\n" > latest_kev.md
          TODAY=$(date +%Y-%m-%d)
          TOTAL=$(jq -r '.count' kev.json)
          LAST=$(jq -r '.catalogVersion' kev.json | sed 's/\./-/g')
          LCOUNT=$(jq --arg date "$LAST" '[.vulnerabilities[] | select(.dateAdded == $date)] | length' kev.json)

          # Create the Markdown table header
          echo -e "## Latest 7 CISA KEV Entries (Total: $TOTAL)\n\n" >> latest_kev.md
          echo -e "| CVE ID | Vendor/Project | Product | Date Added | Known Ransomware |" >> latest_kev.md
          echo -e "| --- | --- | --- | --- | --- |" >> latest_kev.md
          
          # Use jq to get the 7 most recent CVEs by dateAdded
          jq -r '.vulnerabilities | sort_by(.dateAdded) | reverse | .[0:7] | .[] | "| \(.cveID) | \(.vendorProject) | \(.product) | \(.dateAdded) | \(.knownRansomwareCampaignUse) |"' kev.json >> latest_kev.md
          echo -e "\n\n" >> latest_kev.md
          echo -e "> *Last update:* ***$LAST*** *(added $LCOUNT CVE)* \n\n" >> latest_kev.md
          echo -e "> *Last check:* ***$TODAY***\n\n" >> latest_kev.md
          echo -e "Last check: $TODAY" >> $GITHUB_STEP_SUMMARY
          echo -e "Last update: $LAST ($LCOUNT added)" >> $GITHUB_STEP_SUMMARY

      - name: Update README
        run: |
          # Update latest content into README.md 
          mv latest_kev.md README.md

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Updated with latest CISA KEV entries."  || exit 0
          git push

      - name: Count and Publish Daily CVEs
        run: |
          TODAY=$(date +'%Y-%m-%d')
          COUNT=$(jq --arg date "$TODAY" '[.vulnerabilities[] | select(.dateAdded == $date)] | length' kev.json)
          
          if [ "$COUNT" -gt 0 ]; then
            # Format message for pluralization
            if [ "$COUNT" -eq 1 ]; then
              MESSAGE="⚠️ **$COUNT CVE was added today ($TODAY)!** Review immediate patching requirements."
            else
              MESSAGE="⚠️ **$COUNT CVEs were added today ($TODAY)!** Review immediate patching requirements."
            fi
            
            # Post to Summary and fail the build
            echo "### 🛑 High Alert: New Exploited Vulnerabilities" >> $GITHUB_STEP_SUMMARY
            echo "$MESSAGE" >> $GITHUB_STEP_SUMMARY
            echo "::error title=New KEV Detected::Found $COUNT new vulnerabilities added today."
            exit 1
          else
            # Keep it green if nothing is found
            echo "### ✅ Daily KEV Update" >> $GITHUB_STEP_SUMMARY
            echo "No new CVEs were added today ($TODAY)." >> $GITHUB_STEP_SUMMARY
          fi

