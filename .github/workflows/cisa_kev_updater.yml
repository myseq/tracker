name: Updates CISA KEV List

on:
  workflow_dispatch:
  schedule:
    - cron: '43 21 * * *'

# Add this section here
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: kev-update
  cancel-in-progress: true

jobs:
  update-kev:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch CISA KEV feed
        run: |
          set -euo pipefail
          curl -fsSL https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json -o kev.json
          test -s kev.json

      - name: Generate KEV markdown
        run: |
          set -euo pipefail
          TODAY=$(date -u +%Y-%m-%d)
          {
            echo "## Latest 5 CISA KEV Entries"
            echo ""
            echo "| CVE ID | Vendor / Project | Product | Date Added |"
            echo "| --- | --- | --- | --- |"
            jq -r '
              .vulnerabilities
              | sort_by(.dateAdded)
              | reverse
              | .[0:5][]
              | "| \(.cveID) | \(.vendorProject) | \(.product) | \(.dateAdded) |"
            ' kev.json
            echo ""
            echo "> *Last update: ${TODAY} (UTC)*"
          } > kev_section.md

      - name: Update README section
        run: |
          set -euo pipefail
          
          # Safety Check
          if ! grep -q "" README.md || ! grep -q "" README.md; then
            echo "Error: Markers missing in README.md"
            exit 1
          fi

          # 1. Get everything BEFORE the start tag (including the tag)
          sed -n '1,//p' README.md > README.new
          
          # 2. Add the NEW content
          cat kev_section.md >> README.new
          
          # 3. Get everything AFTER the end tag (including the tag)
          sed -n '//,$p' README.md >> README.new
          
          mv README.new README.md

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          
          if ! git diff --cached --quiet; then
            git commit -m "Update latest CISA KEV entries"
            git pull --rebase origin main
            git push
          else
            echo "No changes detected."
          fi
