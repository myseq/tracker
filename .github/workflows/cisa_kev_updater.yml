name: Updates CISA KEV List

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *' # UTC +0 time

concurrency:
  group: kev-update
  cancel-in-progress: true

jobs:
  update-kev:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch CISA KEV feed
        run: |
          set -euo pipefail
          curl -fsSL \
            https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json \
            -o kev.json

          # Fail if empty
          test -s kev.json

      - name: Generate KEV markdown
        run: |
          set -euo pipefail
          TODAY=$(date -u +%Y-%m-%d)

          {
            echo "## Latest 5 CISA KEV Entries"
            echo ""
            echo "| CVE ID | Vendor / Project | Product | Date Added |"
            echo "| --- | --- | --- | --- |"

            jq -r '
              .vulnerabilities
              | sort_by(.dateAdded)
              | reverse
              | .[0:5][]
              | "| \(.cveID) | \(.vendorProject) | \(.product) | \(.dateAdded) |"
            ' kev.json

            echo ""
            echo "> *Last update: ${TODAY} (UTC)*"
          } > kev_section.md

      - name: Update README section
        run: |
          set -euo pipefail

          awk '
            BEGIN {in_block=0}
            /<!-- KEV-START -->/ {
              print
              system("cat kev_section.md")
              in_block=1
              next
            }
            /<!-- KEV-END -->/ {
              in_block=0
              print
              next
            }
            !in_block { print }
          ' README.md > README.tmp

          mv README.tmp README.md

      - name: Commit changes if any
        run: |
          git diff --quiet && echo "No changes detected" && exit 0

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md
          git commit -m "Update latest CISA KEV entries"
          git push

