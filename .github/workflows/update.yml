name: Update CISA KEV List
on:
  workflow_dispatch: # Allows manual trigger
  schedule:
    - cron: '8 16 * * *' # Runs daily 

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetching CISA KEV
        run: |
          # Fetch the official JSON feed
          curl -s https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json > kev.json
          
      - name: Parsing JSON
        run: |
          # Use jq to get the 5 most recent CVEs by dateAdded
          TODAY=$(date +%Y-%m-%d)
          echo -e "# Myseq Tracker\n\n" >> latest_kev.md
          echo -e "## Latest 5 CISA KEV Entries\n\n" >> latest_kev.md
          echo -e "| CVE ID | Vendor/Project | Product | Date Added |" >> latest_kev.md
          echo -e "| --- | --- | --- | --- |" >> latest_kev.md
          jq -r '.vulnerabilities | sort_by(.dateAdded) | reverse | .[0:5] | .[] | "| [\(.cveID)] | \(.vendorProject) | \(.product) | \(.dateAdded) |"' kev.json >> latest_kev.md
          echo -e "\n\n" >> latest_kev.md
          echo -e "> *Last update: $TODAY*" >> latest_kev.md

      - name: Update README
        run: |
          # Replace content between markers in README.md or just overwrite it
          cat latest_kev.md > README.md

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update latest CISA KEV entries" || exit 0
          git push

